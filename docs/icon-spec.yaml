# ═══════════════════════════════════════════════════════════════════════════════
# SeaBound Icon Specification
# ═══════════════════════════════════════════════════════════════════════════════
#
# DSL for specifying all game icons. Each entry describes what to generate,
# how it relates to other icons, and how it fits the visual theme.
#
# FIELDS:
#   id:          Matches the game's TypeScript enum value
#   object:      What the icon literally depicts
#   description: Art direction — composition, angle, lighting, key details
#   use:         Where this icon appears in-game
#   theme:       Visual mood — maps to game phase color palette
#   category:    Visual grouping — icons in same category share style/palette
#   chain:       Named generation chain — items in the same chain should look
#                related. Generate the "base" item first, then use img2img
#                or style-reference for derived items to ensure visual continuity
#   chain_role:  "base" = generate first; "derived" = use base as reference
#   chain_note:  How this item visually differs from its chain base
#   size:        Target render size (all icons are square)
#   tags:        Freeform tags for filtering/batch generation
#
# ═══════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
# STYLE GUIDE
# ─────────────────────────────────────────────────────────────────────────────

style:
  approach: "Painterly pixel art — chunky but expressive, 2-3px outlines"
  resolution: "64×64 native, rendered at 32×32 in-game (retina-ready)"
  palette_constraints:
    - "Dark teal/ocean background (#0c1a1a to #132626) — icons must pop against this"
    - "Warm sand/amber highlights (#f0a050, #c8b090) for organic materials"
    - "Cool blue-greens (#50b0d0, #38bdf8) for water/maritime items"
    - "Muted grey-blue (#a0a8b8) for stone items"
    - "Lush greens (#7bc67b, #4ade80) for plant/bamboo items"
    - "Fire oranges/reds (#f0a050, #e05030) for cooked/fire items"
    - "All icons should have slight warm ambient light as if lit by tropical sun or campfire"
  composition:
    - "Single object, centered, filling ~80% of the frame"
    - "Slight 3/4 top-down perspective (like looking at items on the ground)"
    - "Subtle drop shadow on bottom edge for depth"
    - "No background — transparent PNG with optional subtle glow matching phase color"
  consistency:
    - "Same lighting direction (top-left) across all icons"
    - "Same outline weight (2-3px at 64×64)"
    - "Natural, weathered, handmade feel — nothing looks factory-produced"
    - "Tropical island color temperature — warm, slightly sun-bleached"
  phase_tinting:
    bare_hands: "Sandy, muted tones (#c8b090). Raw, unprocessed look."
    bamboo: "Green-tinted (#7bc67b). Fresh-cut, fibrous textures."
    fire: "Warm amber/orange (#f0a050). Charred edges, smoke wisps."
    stone: "Cool grey-blue (#a0a8b8). Sharp edges, flaked surfaces."
    maritime: "Ocean blue-cyan (#50b0d0). Weathered wood, salt-bleached."
  generation_workflow:
    - "1. Generate all chain 'base' icons first"
    - "2. Review and approve base icons"
    - "3. Use img2img / style-ref from approved base to generate 'derived' icons"
    - "4. Generate standalone icons (no chain) in category batches"
    - "5. Final pass: ensure consistent lighting, outline weight, and saturation"

