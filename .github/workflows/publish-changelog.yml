name: Publish Changelog

on:
  push:
    branches: [main]
    paths:
      - "CHANGELOG.md"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check changelog exists
        run: test -f CHANGELOG.md

      - name: Upload changelog to R2
        run: |
          curl -sf -X PUT \
            -H "Authorization: Bearer ${{ secrets.SEABOUND_API_KEY }}" \
            -H "Content-Type: text/markdown" \
            --data-binary @CHANGELOG.md \
            "${{ secrets.SEABOUND_WORKER_URL }}/api/store/changelog.md"
        env:
          SEABOUND_API_KEY: ${{ secrets.SEABOUND_API_KEY }}
          SEABOUND_WORKER_URL: ${{ secrets.SEABOUND_WORKER_URL }}
